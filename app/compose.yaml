services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aws-athena-api-demo
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx512m --enable-preview"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
