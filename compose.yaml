services:
  backend:
    image: gekal/aws-athena-api-demo:0.0.1-SNAPSHOT
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aws-athena-api-demo-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx512m --enable-preview"
      CORS_ALLOWED_ORIGINS: "http://localhost:3001,http://localhost:3000,http://localhost"
      AWS_PROFILE: "${AWS_PROFILE:-default}"
      # AWS_ACCESS_KEY_ID: ""
      # AWS_SECRET_ACCESS_KEY: ""
      # AWS_SESSION_TOKEN: ""
      # AWS_REGION: "${AWS_REGION:ap-northeast-1}"
    volumes:
      - ~/.aws:/home/gradle/.aws
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
    container_name: aws-athena-api-demo-frontend
    ports:
      - "3001:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
