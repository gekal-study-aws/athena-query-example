<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena API Test Page</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }

        .section {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .section h2 {
            margin-top: 0;
        }

        label {
            display: inline-block;
            width: 100px;
        }

        input {
            margin-bottom: 5px;
        }

        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 3px;
            max-height: 300px;
            overflow: auto;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>
<h1>Athena API Test Page</h1>

<div class="section">
    <h2>1. Submit Query</h2>
    <label>Year:</label> <input type="text" id="year" value="2026"><br>
    <label>Month:</label> <input type="text" id="month" value="01"><br>
    <label>Day:</label> <input type="text" id="day" value="01"><br>
    <label>User ID:</label> <input type="text" id="userId" value="user_2"><br>
    <button onclick="submitQuery()">Submit Query</button>
    <p>Query Execution ID: <span id="queryIdDisplay">-</span></p>
</div>

<div class="section">
    <h2>2. Actions for Query</h2>
    <label>Query ID:</label> <input type="text" id="queryIdInput" style="width: 300px;"><br>
    <button onclick="checkStatus()">Check Status</button>
    <button onclick="getResults()">Get Results</button>
    <button onclick="getResultsStream()">Get Results (Stream)</button>
    <button onclick="getResultsStreamAndSaveCsv()">Stream and Save CSV</button>
    <button onclick="getDownloadUrl()">Get Download URL</button>
</div>

<div class="section">
    <h2>Response</h2>
    <pre id="responseOutput">Waiting for action...</pre>
</div>

<script>
    const responseOutput = document.getElementById('responseOutput');
    const queryIdDisplay = document.getElementById('queryIdDisplay');
    const queryIdInput = document.getElementById('queryIdInput');

    function log(message) {
        if (typeof message === 'object') {
            responseOutput.textContent = JSON.stringify(message, null, 2);
        } else {
            responseOutput.textContent = message;
        }
    }

    async function submitQuery() {
        const requestData = {
            year: document.getElementById('year').value,
            month: document.getElementById('month').value,
            day: document.getElementById('day').value,
            userId: document.getElementById('userId').value
        };

        try {
            const response = await fetch('/api/athena/query', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(requestData)
            });
            const data = await response.json();
            log(data);
            if (data.queryExecutionId) {
                queryIdDisplay.textContent = data.queryExecutionId;
                queryIdInput.value = data.queryExecutionId;
            }
        } catch (error) {
            log('Error: ' + error.message);
        }
    }

    async function checkStatus() {
        const queryId = queryIdInput.value;
        if (!queryId) return alert('Please enter Query Execution ID');

        // Remove old save button if exists
        const oldBtn = document.getElementById('saveResultCsvBtn');
        if (oldBtn) oldBtn.remove();

        try {
            const response = await fetch(`/api/athena/status/${queryId}`);
            const data = await response.json();
            log(data);
        } catch (error) {
            log('Error: ' + error.message);
        }
    }

    async function getResults() {
        const queryId = queryIdInput.value;
        if (!queryId) return alert('Please enter Query Execution ID');

        // Remove old save button if exists
        const oldBtn = document.getElementById('saveResultCsvBtn');
        if (oldBtn) oldBtn.remove();

        try {
            const response = await fetch(`/api/athena/results/${queryId}`);
            const data = await response.json();
            log(data);
            if (Array.isArray(data) && data.length > 0) {
                const saveBtn = document.createElement('button');
                saveBtn.id = 'saveResultCsvBtn';
                saveBtn.textContent = 'Save this result as CSV';
                saveBtn.onclick = () => downloadCsv(data, `query_results_${queryId}.csv`);
                responseOutput.parentNode.insertBefore(saveBtn, responseOutput.nextSibling);
            }
        } catch (error) {
            log('Error: ' + error.message);
        }
    }

    async function getResultsStream() {
        const queryId = queryIdInput.value;
        if (!queryId) return alert('Please enter Query Execution ID');

        // Remove old save button if exists
        const oldBtn = document.getElementById('saveResultCsvBtn');
        if (oldBtn) oldBtn.remove();

        log('Starting stream...');
        responseOutput.textContent = '';

        try {
            const response = await fetch(`/api/athena/results-stream/${queryId}`);
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value, {stream: true});
                responseOutput.textContent += chunk + '\n';
            }
            responseOutput.textContent += '\n--- Stream Finished ---';
        } catch (error) {
            log('Error: ' + error.message);
        }
    }

    async function getResultsStreamAndSaveCsv() {
        const queryId = queryIdInput.value;
        if (!queryId) return alert('Please enter Query Execution ID');

        // Remove old save button if exists
        const oldBtn = document.getElementById('saveResultCsvBtn');
        if (oldBtn) oldBtn.remove();

        log('Starting stream and saving to CSV...');
        responseOutput.textContent = '';

        try {
            const response = await fetch(`/api/athena/results-stream/${queryId}`);
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            let results = [];
            let buffer = '';

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, {stream: true});
                
                // ResponseBodyEmitter might send multiple JSON objects
                // In Spring, default serialization for multiple objects in ResponseBodyEmitter
                // is often just concatenating them or using a specific delimiter if configured.
                // Assuming they are concatenated JSON objects for now, or similar.
                // Actually, ResponseBodyEmitter with Jackson usually sends them as individual JSON objects.
                
                // Simple attempt to parse the buffer as individual objects
                // This is a naive implementation; for production, a proper NDJSON parser would be better.
                try {
                    // Try to find individual JSON objects in the buffer
                    // This assumes objects don't contain '}{' inside strings.
                    let boundary;
                    while ((boundary = buffer.indexOf('}{')) !== -1) {
                        const jsonStr = buffer.substring(0, boundary + 1);
                        results.push(JSON.parse(jsonStr));
                        buffer = buffer.substring(boundary + 1);
                        responseOutput.textContent += `Received ${results.length} rows...\n`;
                    }
                    // Try parsing the remaining buffer if it's a complete object
                    try {
                        const jsonStr = buffer;
                        const obj = JSON.parse(jsonStr);
                        results.push(obj);
                        buffer = '';
                        responseOutput.textContent += `Received ${results.length} rows...\n`;
                    } catch (e) {
                        // Not a complete JSON yet, wait for more data
                    }
                } catch (error) {
                    console.error('Parsing error', error);
                }
            }

            // If there's any remaining buffer, try to parse it
            if (buffer.trim()) {
                try {
                    const obj = JSON.parse(buffer);
                    results.push(obj);
                    responseOutput.textContent += `Received ${results.length} rows...\n`;
                } catch (e) {
                    console.error('Final buffer parsing error', e);
                }
            }

            if (results.length > 0) {
                downloadCsv(results, `query_results_${queryId}.csv`);
                responseOutput.textContent += `\n--- Finished. Downloaded ${results.length} rows ---`;
            } else {
                responseOutput.textContent += '\n--- Finished. No data received ---';
            }
        } catch (error) {
            log('Error: ' + error.message);
        }
    }

    function downloadCsv(data, filename) {
        if (data.length === 0) return;

        // Filter out header row if it exists in the data
        // Check if the first row has values identical to the keys (this might happen if Athena returns a header row)
        let startIndex = 0;
        const keys = Object.keys(data[0]).filter(k => k !== 'otherDetails');
        const firstRowValues = keys.map(k => data[0][k]);
        
        // If every value in the first row is equal to its key, we assume it's a header row
        // or if it matches certain CamelCase vs snake_case patterns that Athena might use for keys
        const isHeaderRow = keys.every((key, index) => {
            const val = firstRowValues[index];
            if (typeof val !== 'string') return false;
            
            const normalizedVal = val.toLowerCase().replace(/_/g, '');
            const normalizedKey = key.toLowerCase().replace(/_/g, '');
            return normalizedVal === normalizedKey;
        });

        if (isHeaderRow) {
            startIndex = 1;
        }

        const headers = keys;
        
        const csvRows = [];
        csvRows.push(headers.map(h => `"${h}"`).join(','));

        for (let i = startIndex; i < data.length; i++) {
            const row = data[i];
            const values = headers.map(header => {
                const val = row[header] === null || row[header] === undefined ? '' : row[header];
                const escaped = ('' + val).replace(/"/g, '""');
                return `"${escaped}"`;
            });
            csvRows.push(values.join(','));
        }

        const csvContent = csvRows.join('\n');
        const blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8;'});
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.setAttribute('href', url);
        link.setAttribute('download', filename);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    async function getDownloadUrl() {
        const queryId = queryIdInput.value;
        if (!queryId) return alert('Please enter Query Execution ID');

        // Remove old save button if exists
        const oldBtn = document.getElementById('saveResultCsvBtn');
        if (oldBtn) oldBtn.remove();

        try {
            const response = await fetch(`/api/athena/download-url/${queryId}`);
            const data = await response.json();
            log(data);
            if (data.downloadUrl) {
                const link = document.createElement('a');
                link.href = data.downloadUrl;
                link.textContent = ' [Download Link]';
                link.target = '_blank';
                responseOutput.appendChild(link);
            }
        } catch (error) {
            log('Error: ' + error.message);
        }
    }
</script>
</body>
</html>
